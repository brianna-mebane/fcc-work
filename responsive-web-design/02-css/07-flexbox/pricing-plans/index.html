<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Plans Layout Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Pricing Plans</h1>
    <div class="pricing-container">
        <div class="pricing-card basic-plan">
            <h2>Basic</h2>
            <p class="cost">$9/month</p>
            <ul class="features">
                <li>Access to 24/7 customer service</li>
                <li>Lossless audio</li>
                <li>Audio customization including cross-fading & equalizers</li>
            </ul>
        </div>
        <div class="pricing-card pro-plan">
            <h2>Pro</h2>
            <p class="cost">$19/month</p>
        </div>
        <div class="pricing-card premium-plan">
            <h2>Premium</h2>
            <p class="cost">$29/month</p>
        </div>
    </div>
</body>
</html>
