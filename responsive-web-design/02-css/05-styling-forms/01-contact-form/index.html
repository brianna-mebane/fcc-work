<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="form-container">
        <form action="">
            <h2>Song Recommendation Form</h2>
            <fieldset>
                <label for="name">Name (required): <input type="text" id="name" name="name" required></label>
                <label for="email">Email Address (required): <input type="email" id="email" name="email" required></label>
                <label for="songs">Share your song recommendation(s) below!<textarea name="songs" id="songs" required rows="8"></textarea></label>
            </fieldset>
            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
