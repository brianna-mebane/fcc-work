<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Selection Feature Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Feature Selection</h1>
    <div class="feature-card-container">
        <label class="feature-card" for="lossless"><input type="checkbox" id="lossless">Lossless Audio</label>
        <label class="feature-card" for="offline"><input type="checkbox" id="offline">Offline Mode</label>
        <label class="feature-card" for="equalizer"><input type="checkbox" id="equalizer">Music Equalizer</label>
        <label class="feature-card" for="activity"><input type="checkbox" id="activity">Activity Sharing</label>
        <label class="feature-card" for="jam-sesh"><input type="checkbox" id="jam-sesh">Jam Session</label>
        <label class="feature-card" for="personal-recs"><input type="checkbox" id="personal-recs">Personalized Recommendations</label>
    </div>
</body>
</html>
