<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Inventory App</title>
</head>
<body>
    <h1>Book Inventory</h1>
    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>Author</th>
                <th>Category</th>
                <th>Status</th>
                <th>Rate</th>
            </tr>
        </thead>
        <tbody>
            <tr class="read">
                <td>I Will Teach You to Be Rich</td>
                <td>Ramit Sethi</td>
                <td>Personal Finance</td>
                <td>Read</td>
                <td>
                    <span class="rate three">
                        <span></span>
                        <span></span>
                        <span></span>
                    </span>
                </td>
            </tr>
            <tr class="in-progress">
                <td>I Know Why the Caged Bird Sings</td>
                <td>Maya Angelou</td>
                <td>Autobiography</td>
                <td>In Progress</td>
                <td>
                    <span class="rate">
                        <span></span>
                        <span></span>
                        <span></span>
                    </span>
                </td>
            </tr>
            <tr class="to-read">
                <td>Seven Husbands of Evelyn Hugo</td>
                <td>Taylor Jenkins Reid</td>
                <td>Historical Fiction</td>
                <td>To Read</td>
                <td>
                    <span class="rate">
                        <span></span>
                        <span></span>
                        <span></span>
                    </span>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
