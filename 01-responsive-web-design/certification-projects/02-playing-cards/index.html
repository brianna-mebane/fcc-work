<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playing Cards</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Playing Cards</h1>
    <main id="playing-cards">
        <div class="card hearts">
            <div class="left">
                <p>A</p>
                <p>♥</p>
            </div>
            <div class="middle">
                <p>♥</p>
            </div>
            <div class="right">
                <p>A</p>
                <p>♥</p>
            </div>
        </div>
        <div class="card spades">
            <div class="left">
                <p>4</p>
                <p>♠</p>
            </div>
            <div class="middle">
                <p class="top-suits">♠♠</p>
                <p class="bottom-suits">♠♠</p>
            </div>
            <div class="right">
                <p>4</p>
                <p>♠</p>
            </div>
        </div>
        <div class="card diamonds">
            <div class="left">
                <p>2</p>
                <p>♦</p>
            </div>
            <div class="middle">
                <p class="top-suits">♦</p>
                <p class="bottom-suits">♦</p>
            </div>
            <div class="right">
                <p>2</p>
                <p>♦</p>
            </div>
        </div>
        <div class="card clubs">
            <div class="left">
                <p>3</p>
                <p>♣</p>
            </div>
            <div class="middle">
                <p class="top-suits">♣</p>
                <p>♣</p>
                <p class="bottom-suits">♣</p>
            </div>
            <div class="right">
                <p>3</p>
                <p>♣</p>
            </div>
        </div>
    </main>
</body>
</html>
