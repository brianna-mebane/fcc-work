<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <title>Styled To-Do List</title>
</head>
<body>
    <ul class="todo-list">
        <li>
            <input type="checkbox" id="book">
            <label for="book">finish reading <i>the carnivorous carnival</i> by lemony snicket.</label>
            <ul class="sub-item">
                <li>track progress on <a class="sub-item-link" href="https://www.goodreads.com/" target="_blank">goodreads</a>.</li>
            </ul>
        </li>
        <li>
            <input type="checkbox" id="walking">
            <label for="walking">walk four miles by the end of the day.</label>
            <ul class="sub-item">
                <li>if you're looking to distract yourself, watch something from netflix, <a class="sub-item-link" href="https://tubitv.com" target="_blank">tubi</a>, or even youtube while you move.</li>
            </ul>
        </li>
        <li>
            <input type="checkbox" id="meditation">
            <label for="meditation">meditate in a quiet area for at least 10 minutes.</label>
            <ul class="sub-item">
                <li>use a timer in the <a class="sub-item-link" href="https://tide.fm/en_US/" target="_blank">tide app</a>.</li>
            </ul>
        </li>
        <li>
            <input type="checkbox" id="basketball">
            <label for="basketball">WATCH THE BOSTON CELTICS PLAY WITH JAYSON TATUM FOR THE FIRST TIME THIS SEASON.</label>
            <ul class="sub-item">
                <li>peep the box score against the dallas mavericks on <a class="sub-item-link" href="https://www.nba.com/game/dal-vs-bos-0022500908" target="_blank">nba.com</a>.</li>
            </ul>
        </li>
    </ul>
</body>
</html>
