<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Availability Table</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <table>
        <tbody>
            <tr class="sharp">
                <th class="time" rowspan="2">9:00 AM</th>
                <th>MONDAY</th>
                <th>TUESDAY</th>
                <th>WEDNESDAY</th>
                <th>THURSDAY</th>
                <th>FRIDAY</th>
            </tr>
            <tr class="half">
                <td class="available-0"></td>
                <td class="available-1"></td>
                <td class="available-3"></td>
                <td class="available-2"></td>
                <td class="available-4"></td>
            </tr>
            <tr class="sharp">
                <th class="time" rowspan="2">10:00 AM</th>
                <td class="available-5"></td>
                <td class="available-1"></td>
                <td class="available-3"></td>
                <td class="available-4"></td>
                <td class="available-2"></td>
            </tr>
            <tr class="half">
                <td class="available-5"></td>
                <td class="available-3"></td>
                <td class="available-0"></td>
                <td class="available-1"></td>
                <td class="available-2"></td>
            </tr>
            <tr class="sharp">
                <th class="time" rowspan="2">11:00 AM</th>
                <td class="available-4"></td>
                <td class="available-5"></td>
                <td class="available-2"></td>
                <td class="available-3"></td>
                <td class="available-0"></td>
            </tr>
            <tr class="half">
                <td class="available-1"></td>
                <td class="available-5"></td>
                <td class="available-3"></td>
                <td class="available-2"></td>
                <td class="available-4"></td>
            </tr>
            <tr class="sharp">
                <th class="time" rowspan="2">12:00 PM</th>
                <td class="available-4"></td>
                <td class="available-2"></td>
                <td class="available-0"></td>
                <td class="available-5"></td>
                <td class="available-3"></td>
            </tr>
            <tr class="half">
                <td class="available-0"></td>
                <td class="available-3"></td>
                <td class="available-5"></td>
                <td class="available-2"></td>
                <td class="available-1"></td>
            </tr>
            <tr class="sharp">
                <th class="time" rowspan="2">1:00 PM</th>
                <td class="available-5"></td>
                <td class="available-1"></td>
                <td class="available-4"></td>
                <td class="available-0"></td>
                <td class="available-2"></td>
            </tr>
            <tr class="half">
                <td class="available-3"></td>
                <td class="available-4"></td>
                <td class="available-5"></td>
                <td class="available-0"></td>
                <td class="available-2"></td>
            </tr>
            <tr class="sharp">
                <th class="time" rowspan="2">2:00 PM</th>
                <td class="available-0"></td>
                <td class="available-5"></td>
                <td class="available-4"></td>
                <td class="available-2"></td>
                <td class="available-3"></td>
            </tr>
            <tr class="half">
                <td class="available-0"></td>
                <td class="available-3"></td>
                <td class="available-5"></td>
                <td class="available-4"></td>
                <td class="available-2"></td>
            </tr>
            <tr class="sharp">
                <th class="time" rowspan="2">3:00 PM</th>
                <td class="available-2"></td>
                <td class="available-3"></td>
                <td class="available-4"></td>
                <td class="available-0"></td>
                <td class="available-5"></td>
            </tr>
            <tr class="half">
                <td class="available-0"></td>
                <td class="available-3"></td>
                <td class="available-5"></td>
                <td class="available-2"></td>
                <td class="available-4"></td>
            </tr>
            <tr class="sharp">
                <th class="time" rowspan="2">4:00 PM</th>
                <td class="available-2"></td>
                <td class="available-1"></td>
                <td class="available-4"></td>
                <td class="available-5"></td>
                <td class="available-3"></td>
            </tr>
            <tr class="half">
                <td class="available-0"></td>
                <td class="available-4"></td>
                <td class="available-3"></td>
                <td class="available-2"></td>
                <td class="available-1"></td>
            </tr>
            <tr class="sharp">
                <th class="time" rowspan="2">5:00 PM</th>
                <td class="available-4"></td>
                <td class="available-0"></td>
                <td class="available-3"></td>
                <td class="available-2"></td>
                <td class="available-5"></td>
            </tr>
            <tr>
                <td class="available-2"></td>
                <td class="available-1"></td>
                <td class="available-0"></td>
                <td class="available-4"></td>
                <td class="available-5"></td>
            </tr>
        </tbody>
    </table>
    <div id="legend">
        <span>Availability</span>
        <div id="legend-text">
            <p>0</p>
            <div id="legend-gradient"></div>
            <p>5+</p>
        </div>
    </div>
</body>
</html>
