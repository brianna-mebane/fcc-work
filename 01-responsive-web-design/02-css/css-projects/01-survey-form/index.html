<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Music Listening Survey</title>
</head>
<body>
    <h1 id="title">Music Listening Survey</h1>
    <p id="description">This is a brief survey meant to aggregate information about people's music listening habits. Answer honestly and try not to overthink any of your answers!</p>

    <form action="" id="survey-form">
        <label id="name-label" for="name">Name: </label>
        <input type="text" id="name" placeholder="Jane Doe" required>
        <label id="email-label" for="email">Email Address: </label>
        <input type="email" id="email" placeholder="example@example.com" required>
        <label id="number-label" for="number">Age (optional): </label>
        <input id="number" type="number" id="number" placeholder="25" min="18" max="100">

        <label for="dropdown">What is your favorite music genre?</label>
        <select name="favorite-genre" id="dropdown">
            <option value="pop">Pop</option>
            <option value="r-and-b">R&B</option>
            <option value="rock">Rock</option>
            <option value="rap">Hip-Hop/Rap</option>
            <option value="country">Country</option>
            <option value="edm">EDM</option>
        </select>

        <fieldset>
            <legend>Do you listen to music using streaming platforms?</legend>
            <input id="yes-option" type="radio" name="streaming" value="yes">
            <label for="yes-option">Yes</label>
            <input id="no-option" type="radio" name="streaming" value="no">
            <label for="no-option">No</label>
        </fieldset>

        <fieldset>
            <legend>Which streaming platform(s) do you use?</legend>
            <input type="checkbox" id="spotify" name="platform" value="spotify">
            <label for="spotify">Spotify</label>
            <input type="checkbox" id="apple-music" name="platform" value="apple-music">
            <label for="apple-music">Apple Music</label>
            <input type="checkbox" id="youtube-music" name="platform" value="youtube-music">
            <label for="youtube-music">YouTube Music</label>
            <input type="checkbox" id="tidal" name="platform" value="tidal">
            <label for="tidal">Tidal</label>
            <input type="checkbox" id="deezer" name="platform" value="deezer">
            <label for="deezer">Deezer</label>
            <input type="checkbox" id="other" name="platform" value="other">
            <label for="other">Other</label>
        </fieldset>

        <label for="comments">What's a musical artist you would recommend to someone?</label>
        <textarea cols="30" rows="5" name="comments" id="comments"></textarea>

        <button id="submit">Submit</button>
    </form>
</body>
</html>
